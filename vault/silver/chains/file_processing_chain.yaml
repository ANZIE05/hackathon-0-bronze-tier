# File Processing Chain
# Processes dropped files: analyze content, determine action, route appropriately

name: "file_processing_chain"
description: "Process files dropped in Inbox - analyze content, determine type and action, route to appropriate folder"
version: "1.0"

steps:
  # Step 1: Read file metadata
  - skill: "read_file_metadata"
    input:
      file_path: "${_file_path}"
    output: "file_metadata"
    required: true

  # Step 2: Analyze file content
  - skill: "analyze_file_content"
    input:
      file_path: "${_file_path}"
      file_type: "${file_metadata.type}"
    output: "content_analysis"
    required: true

  # Step 3: Determine file category
  - skill: "categorize_file"
    input:
      content: "${content_analysis}"
      metadata: "${file_metadata}"
    output: "category"
    required: true

  # Step 4: Check if file requires action
  - skill: "requires_action"
    input:
      category: "${category}"
      content: "${content_analysis}"
    output: "action_required"
    required: true

  # Step 5: Extract key information if action needed
  - skill: "extract_action_items"
    input:
      content: "${content_analysis}"
      category: "${category}"
    output: "action_items"
    required: "${action_required}"

  # Step 6: Create action file or route to done
  - skill: "create_action_file"
    input:
      file_metadata: "${file_metadata}"
      content_analysis: "${content_analysis}"
      action_items: "${action_items}"
      category: "${category}"
    output: "action_file"
    required: "${action_required}"

  # Step 7: Move file to appropriate folder
  - skill: "route_file"
    input:
      source: "${_file_path}"
      category: "${category}"
      action_required: "${action_required}"
    output: "routing_result"
    required: true

  # Step 8: Log the processing
  - skill: "log_file_processing"
    input:
      file_name: "${file_metadata.name}"
      category: "${category}"
      action_taken: "${action_required ? 'action_created' : 'routed_to_done'}"
    output: "log_entry"
    required: false

error_handling:
  on_failure: "rollback"
  max_retries: 2
  notify_on_error: true
  fallback_action: "move_to_manual_review"
